<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TITLE -->
    <title>{{ title if title else "Oleksii Brik" }}</title>

    <!-- DESCRIPTION -->
    <meta name="description"
          content="{{ description if description else 'Professional Civil Engineer in Portugal. Fiscalização, construction management and licensing support.' }}">

    <!-- SEO verification -->
    <meta name="google-site-verification"
          content="jPfIveTREHeJKHDU-fnv6AaCaKUftaxF1vpS803L8Is">

    <!-- Canonical -->
    <link rel="canonical" href="{{ request.url }}">

    <!-- Hreflang -->
    <link rel="alternate" hreflang="pt" href="{{ request.url.replace('/' + lang + '/', '/pt/') }}">
    <link rel="alternate" hreflang="en" href="{{ request.url.replace('/' + lang + '/', '/en/') }}">
    <link rel="alternate" hreflang="ru" href="{{ request.url.replace('/' + lang + '/', '/ru/') }}">
    <link rel="alternate" hreflang="uk" href="{{ request.url.replace('/' + lang + '/', '/uk/') }}">
    <link rel="alternate" hreflang="x-default" href="{{ request.url.replace('/' + lang + '/', '/pt/') }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:image" content="{{ url_for('static', filename='preview.jpg', _external=True) }}">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- Theme -->
    <meta name="theme-color" content="#212529">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Oleksii Brik",
      "jobTitle": "Civil Engineer",
      "telephone": "+351912108461",
      "email": "alexe7abc@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PT",
        "addressLocality": "Lisboa"
      }
    }
    </script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <!-- BRAND -->
        <a class="navbar-brand"
           href="{{ url_for('index', lang=lang) }}">
            Oleksii Brik
        </a>

        <!-- MOBILE -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('index', lang=lang) }}">
                        {{ t.nav_home }}
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('services', lang=lang) }}">
                        {{ t.nav_services }}
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('projects', lang=lang) }}">
                        {{ t.nav_projects }}
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{{ url_for('contacts', lang=lang) }}">
                        {{ t.nav_contacts }}
                    </a>
                </li>

                <!-- LANGUAGE SWITCHER -->
                <li class="nav-item d-flex align-items-center ms-3">

                    <a class="nav-link px-2"
                       href="{{ request.url.replace('/' + lang + '/', '/pt/') }}">
                        PT
                    </a>

                    <a class="nav-link px-2"
                       href="{{ request.url.replace('/' + lang + '/', '/en/') }}">
                        EN
                    </a>

                    <a class="nav-link px-2"
                       href="{{ request.url.replace('/' + lang + '/', '/ru/') }}">
                        RU
                    </a>

                    <a class="nav-link px-2"
                       href="{{ request.url.replace('/' + lang + '/', '/uk/') }}">
                        UK
                    </a>

                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<main class="container my-5">
    {% block content %}{% endblock %}
</main>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
